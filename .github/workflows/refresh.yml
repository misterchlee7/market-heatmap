name: Refresh market data & deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Hourly during market hours, offset 31 min past the hour to dodge
    # top-of-hour scheduler congestion (13:31 UTC ~ 9:31am ET in EDT).
    # Range covers EDT & EST close (13:00-21:00 UTC).
    - cron: "31 13-21 * * 1-5"
    # Daily off-hours refresh so the timestamp never goes truly stale.
    - cron: "37 8 * * *"
    # Weekly: rebuild the ticker universe / crypto map and commit if changed.
    # The commit doubles as repo activity so GitHub never auto-disables the cron.
    - cron: "42 9 * * 0"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rebuild ticker universe (weekly)
        if: github.event.schedule == '42 9 * * 0'
        run: |
          node scripts/build-universe.mjs
          if ! git diff --quiet data/; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/universe.json data/crypto-map.json
            git commit -m "chore: weekly universe refresh [skip ci]"
            git push
          fi

      - name: Refresh historical reference prices (daily)
        if: github.event.schedule == '37 8 * * *' || github.event.schedule == '42 9 * * 0'
        run: |
          node scripts/fetch-history.mjs
          if ! git diff --quiet data/refs.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/refs.json
            git commit -m "chore: daily history refresh [skip ci]"
            git push
          fi

      - name: Fetch quotes
        run: node scripts/fetch-quotes.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
