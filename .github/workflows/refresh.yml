name: Refresh market data & deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Intraday quote refresh is handled by the Cloudflare Worker (worker/),
    # whose cron is reliable and never auto-disables. Actions only handles the
    # low-frequency jobs below plus keeping the fallback snapshot fresh daily.
    # Daily off-hours refresh so the bundled fallback quotes.json stays recent.
    - cron: "37 8 * * *"
    # Weekly: rebuild the ticker universe / crypto map and commit if changed.
    # The commit doubles as repo activity so GitHub never auto-disables the cron.
    - cron: "42 9 * * 0"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rebuild ticker universe (weekly)
        if: github.event.schedule == '42 9 * * 0'
        run: |
          node scripts/build-universe.mjs
          if ! git diff --quiet data/; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/universe.json data/crypto-map.json
            git commit -m "chore: weekly universe refresh [skip ci]"
            git push
          fi

      # Intraday-relevant refs are served by the Cloudflare Worker (worker/,
      # /refs, daily cron). Actions rebuilds the bundled fallback refs.json
      # weekly alongside the universe so the offline snapshot never goes stale.
      - name: Refresh historical reference prices (weekly fallback)
        if: github.event.schedule == '42 9 * * 0'
        run: |
          node scripts/fetch-history.mjs
          if ! git diff --quiet data/refs.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/refs.json
            git commit -m "chore: weekly history refresh [skip ci]"
            git push
          fi

      # Refreshes the bundled data/quotes.json that the site falls back to when
      # the Worker feed is unreachable. Intraday freshness comes from the Worker.
      - name: Fetch quotes (fallback snapshot)
        run: node scripts/fetch-quotes.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
