name: Refresh market data & deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Every 15 min spanning US market hours (13:00-21:00 UTC covers EDT & EST).
    - cron: "*/15 13-20 * * 1-5"
    # One run after the close (EST winter close = 21:00 UTC).
    - cron: "5 21 * * 1-5"
    # Daily off-hours refresh so the timestamp never goes truly stale.
    - cron: "0 8 * * *"
    # Weekly: rebuild the ticker universe / crypto map and commit if changed.
    # The commit doubles as repo activity so GitHub never auto-disables the cron.
    - cron: "0 9 * * 0"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rebuild ticker universe (weekly)
        if: github.event.schedule == '0 9 * * 0'
        run: |
          node scripts/build-universe.mjs
          if ! git diff --quiet data/; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/universe.json data/crypto-map.json
            git commit -m "chore: weekly universe refresh [skip ci]"
            git push
          fi

      - name: Fetch quotes
        run: node scripts/fetch-quotes.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
